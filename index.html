<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">

  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#1B5E20">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
      --verde-deep:  #1B5E20;
      --verde-corp:  #2E7D32;
      --verde-light: #4CAF50;
      --amarillo:    #F9A825;
      --tierra:      #5D4037;
      --error:       #C62828;
      --bg:          #0F3A12;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Outfit', sans-serif;
      min-height: 100vh;
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Fondo animado con círculos */
    body::before, body::after {
      content: '';
      position: fixed;
      border-radius: 50%;
      opacity: 0.08;
      pointer-events: none;
    }
    body::before {
      width: 600px; height: 600px;
      background: radial-gradient(circle, #4CAF50, transparent);
      top: -200px; right: -200px;
      animation: drift 12s ease-in-out infinite alternate;
    }
    body::after {
      width: 400px; height: 400px;
      background: radial-gradient(circle, #F9A825, transparent);
      bottom: -100px; left: -100px;
      animation: drift 16s ease-in-out infinite alternate-reverse;
    }
    @keyframes drift {
      from { transform: translate(0,0) scale(1); }
      to   { transform: translate(40px,30px) scale(1.1); }
    }

    .card {
      background: white;
      border-radius: 28px;
      width: 90%;
      max-width: 400px;
      padding: 2.5rem 2rem;
      box-shadow: 0 32px 80px rgba(0,0,0,0.5);
      position: relative;
      z-index: 10;
      animation: slideUp 0.5s cubic-bezier(0.34,1.56,0.64,1) both;
    }
    @keyframes slideUp {
      from { transform: translateY(60px); opacity: 0; }
      to   { transform: translateY(0);    opacity: 1; }
    }

    .brand {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      margin-bottom: 2rem;
    }
    .brand-logo {
      width: 130px;
      height: auto;
      margin-bottom: 10px;
      filter: drop-shadow(0 4px 12px rgba(46,125,50,0.3));
    }
    .brand-slogan {
      font-size: 0.82rem;
      font-weight: 300;
      color: var(--verde-corp);
      font-style: italic;
      letter-spacing: 1.5px;
    }

    .form-title {
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #aaa;
      margin-bottom: 1.2rem;
      text-align: center;
    }

    .field {
      position: relative;
      margin-bottom: 14px;
    }
    .field i.icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: #bbb;
      font-size: 0.9rem;
      pointer-events: none;
      transition: color 0.2s;
    }
    .field:focus-within i.icon { color: var(--verde-corp); }

    .field input {
      width: 100%;
      padding: 14px 14px 14px 40px;
      border: 1.5px solid #e8e8e8;
      border-radius: 12px;
      font-family: 'Outfit', sans-serif;
      font-size: 0.95rem;
      background: #fafafa;
      transition: border-color 0.2s, background 0.2s;
      outline: none;
      color: #222;
    }
    .field input:focus {
      border-color: var(--verde-corp);
      background: #fff;
    }

    .toggle-pass {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: #bbb;
      font-size: 0.9rem;
      padding: 0;
      transition: color 0.2s;
    }
    .toggle-pass:hover { color: var(--verde-corp); }

    .btn-login {
      width: 100%;
      padding: 15px;
      background: linear-gradient(135deg, var(--verde-corp), var(--verde-deep));
      color: white;
      border: none;
      border-radius: 12px;
      font-family: 'Outfit', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 1px;
      cursor: pointer;
      margin-top: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: transform 0.15s, box-shadow 0.15s;
      box-shadow: 0 8px 20px rgba(46,125,50,0.35);
    }
    .btn-login:hover  { transform: translateY(-2px); box-shadow: 0 12px 28px rgba(46,125,50,0.45); }
    .btn-login:active { transform: translateY(0); }
    .btn-login.loading { opacity: 0.8; pointer-events: none; }
    .btn-login .spinner { display: none; }
    .btn-login.loading .spinner { display: block; }
    .btn-login.loading .btn-text { display: none; }

    @keyframes spin { to { transform: rotate(360deg); } }
    .fa-spin-custom { animation: spin 0.8s linear infinite; }

    .error-box {
      background: #fff5f5;
      border: 1.5px solid #fca5a5;
      border-radius: 10px;
      padding: 10px 14px;
      margin-top: 12px;
      font-size: 0.82rem;
      color: var(--error);
      display: none;
      align-items: center;
      gap: 8px;
    }
    .error-box.show { display: flex; }

    .offline-badge {
      display: none;
      align-items: center;
      justify-content: center;
      gap: 6px;
      background: #FFF8E1;
      border: 1.5px solid #F9A825;
      border-radius: 10px;
      padding: 8px 12px;
      font-size: 0.78rem;
      font-weight: 600;
      color: #856404;
      margin-bottom: 14px;
    }
    .offline-badge.show { display: flex; }

    .version {
      text-align: center;
      font-size: 0.68rem;
      color: #ccc;
      margin-top: 1.5rem;
      letter-spacing: 1px;
    }
  </style>
</head>
<body>

<div class="card">
  <div class="brand">
    <img src="Logo_sin_fondo.png" alt="PRODENI" class="brand-logo">
    <span class="brand-slogan">Guardianes de la Tierra</span>
  </div>

  <div class="offline-badge" id="offlineBadge">
    <i class="fas fa-wifi-slash"></i> Modo sin conexión
  </div>

  <p class="form-title">Iniciar Sesión</p>

  <div class="field">
    <i class="fas fa-user icon"></i>
    <input type="text" id="inputUser" placeholder="Usuario"
           autocomplete="username" autocapitalize="none" autocorrect="off" required>
  </div>
  <div class="field">
    <i class="fas fa-lock icon"></i>
    <input type="password" id="inputPass" placeholder="Contraseña"
           autocomplete="current-password" required>
    <button type="button" class="toggle-pass" onclick="togglePass()" tabindex="-1">
      <i class="fas fa-eye" id="eyeIcon"></i>
    </button>
  </div>

  <button class="btn-login" id="btnLogin" onclick="doLogin()">
    <span class="btn-text"><i class="fas fa-sign-in-alt"></i> ENTRAR</span>
    <span class="spinner"><i class="fas fa-leaf fa-spin-custom"></i> Verificando...</span>
  </button>

  <div class="error-box" id="errorBox">
    <i class="fas fa-exclamation-circle"></i>
    <span id="errorMsg">Error</span>
  </div>

  <p class="version">PRODENI v4.0</p>
</div>

<script src="session.js"></script>
<script>
  // ── CONFIG ───────────────────────────────────────────────
  // La URL se guarda desde el panel admin o se puede poner aquí directamente
  var SCRIPT_URL = localStorage.getItem('prodeni_script_url') ||
    'https://script.google.com/macros/s/AKfycbz8rv5sN5oTNQzKGrV5GnxJ6U5FtJEvvvmhMpvI5ZIZ52XZMc1eYTKdVK1oc2c2ZGZs7Q/exec';

  // ── Registrar Service Worker ─────────────────────────────
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js').then(reg => {
      // Pasar URL del script al SW para Background Sync
      (reg.active || reg.installing || reg.waiting)?.postMessage({
        type: 'SAVE_CONFIG',
        config: { scriptUrl: SCRIPT_URL },
      });
    }).catch(() => {});
  }

  // ── Detectar conexión ────────────────────────────────────
  function updateOfflineBadge() {
    document.getElementById('offlineBadge').classList.toggle('show', !navigator.onLine);
  }
  window.addEventListener('online',  updateOfflineBadge);
  window.addEventListener('offline', updateOfflineBadge);
  updateOfflineBadge();

  // ── Redirigir si ya hay sesión activa ────────────────────
  (function checkExistingSession() {
    const s = ProdenSession.get();
    if (s) {
      window.location.href = s.role === 'admin' ? 'admin.html' : 'tecnico.html';
    }
  })();

  // ── Toggle contraseña ─────────────────────────────────────
  function togglePass() {
    const inp  = document.getElementById('inputPass');
    const icon = document.getElementById('eyeIcon');
    if (inp.type === 'password') {
      inp.type = 'text';
      icon.className = 'fas fa-eye-slash';
    } else {
      inp.type = 'password';
      icon.className = 'fas fa-eye';
    }
  }

  // ── Mostrar / ocultar error ──────────────────────────────
  function showError(msg) {
    document.getElementById('errorMsg').textContent = msg;
    document.getElementById('errorBox').classList.add('show');
  }
  function hideError() {
    document.getElementById('errorBox').classList.remove('show');
  }

  // ── Login principal ───────────────────────────────────────
  async function doLogin() {
    const user = document.getElementById('inputUser').value.trim();
    const pass = document.getElementById('inputPass').value.trim();

    if (!user || !pass) { showError('Escribe usuario y contraseña.'); return; }

    hideError();
    const btn = document.getElementById('btnLogin');
    btn.classList.add('loading');

    // ── Intento 1: validar contra servidor ─────────────────
    if (navigator.onLine) {
      try {
        const url = SCRIPT_URL + '?action=login' +
          '&user=' + encodeURIComponent(user) +
          '&pass=' + encodeURIComponent(pass);
        const res  = await fetch(url, { cache: 'no-store' });
        const data = await res.json();

        if (data.valid && data.user) {
          // Login exitoso — guardar sesión y credenciales offline
          const u = { ...data.user, role: (data.user.role || 'tecnico').toLowerCase() };
          ProdenSession.set(u);
          ProdenSession.saveOfflineCreds(user, pass, u.role);
          localStorage.setItem('prodeni_script_url', SCRIPT_URL);
          window.location.href = u.role === 'admin' ? 'admin.html' : 'tecnico.html';
          return;
        } else {
          // Servidor rechazó — INVALIDAR caché para que offline tampoco funcione
          ProdenSession.invalidateCreds();
          showError(data.message || 'Usuario o contraseña incorrectos.');
        }
      } catch (networkErr) {
        // Fallo de red aunque onLine=true — caer a modo offline
        tryOfflineLogin(user, pass);
      }
    } else {
      // ── Intento 2: sin internet — credenciales cacheadas ─
      tryOfflineLogin(user, pass);
    }

    btn.classList.remove('loading');
  }

  function tryOfflineLogin(user, pass) {
    const result = ProdenSession.checkOffline(user, pass);
    if (result) {
      ProdenSession.set(result);
      window.location.href = result.role === 'admin' ? 'admin.html' : 'tecnico.html';
    } else {
      showError('Sin conexión y credenciales no reconocidas en este dispositivo. ' +
        'Si cambiaste tu contraseña, necesitas internet la primera vez.');
      document.getElementById('btnLogin').classList.remove('loading');
    }
  }

  // Enter en los campos hace login
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') doLogin();
  });

  // ── Banner de instalación PWA ─────────────────────────────
  var _installPrompt = null;
  var _isStandalone  = window.matchMedia('(display-mode: standalone)').matches
    || window.navigator.standalone === true;

  if (!_isStandalone && !localStorage.getItem('prodeni_pwa_done')) {
    window.addEventListener('beforeinstallprompt', e => {
      e.preventDefault();
      _installPrompt = e;
      setTimeout(showInstallBanner, 3000);
    });
    // iOS no dispara beforeinstallprompt — instrucciones manuales
    setTimeout(() => {
      if (!_installPrompt && !document.getElementById('installBanner')) {
        showManualInstallBanner();
      }
    }, 5000);
  }

  window.addEventListener('appinstalled', () => {
    localStorage.setItem('prodeni_pwa_done', '1');
    document.getElementById('installBanner')?.remove();
  });

  function showInstallBanner() {
    if (document.getElementById('installBanner')) return;
    const b = document.createElement('div');
    b.id = 'installBanner';
    b.style.cssText = 'position:fixed;bottom:20px;left:50%;transform:translateX(-50%);' +
      'background:#2E7D32;color:white;padding:12px 16px;border-radius:14px;' +
      'font-family:Outfit,sans-serif;font-size:0.82rem;font-weight:600;' +
      'display:flex;align-items:center;gap:10px;z-index:9999;' +
      'box-shadow:0 8px 30px rgba(0,0,0,0.4);max-width:320px;width:90%;';
    b.innerHTML = '<span style="flex:1">🌿 Instala PRODENI en tu dispositivo</span>' +
      '<button onclick="installPWA()" style="background:#F9A825;color:#1B5E20;border:none;' +
      'padding:6px 12px;border-radius:8px;font-family:Outfit,sans-serif;font-weight:700;' +
      'cursor:pointer;font-size:0.8rem;white-space:nowrap;">Instalar</button>' +
      '<button onclick="closeBanner()" style="background:none;border:none;color:rgba(255,255,255,0.7);' +
      'font-size:1.2rem;cursor:pointer;line-height:1;padding:0 2px;">✕</button>';
    document.body.appendChild(b);
    setTimeout(() => b.remove(), 20000);
  }

  function showManualInstallBanner() {
    if (document.getElementById('installBanner')) return;
    const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);
    const msg = isIOS
      ? '📲 Toca <strong>Compartir</strong> → <strong>Agregar a inicio</strong>'
      : '📲 Menú del navegador → <strong>Instalar aplicación</strong>';
    const b = document.createElement('div');
    b.id = 'installBanner';
    b.style.cssText = 'position:fixed;bottom:20px;left:50%;transform:translateX(-50%);' +
      'background:#1B5E20;color:white;padding:14px 16px;border-radius:14px;' +
      'font-family:Outfit,sans-serif;font-size:0.8rem;' +
      'display:flex;flex-direction:column;gap:8px;z-index:9999;' +
      'box-shadow:0 8px 30px rgba(0,0,0,0.4);max-width:300px;width:90%;';
    b.innerHTML = '<div style="display:flex;justify-content:space-between;align-items:center;">' +
      '<strong>🌿 Instala PRODENI</strong>' +
      '<button onclick="closeBanner()" style="background:none;border:none;color:rgba(255,255,255,0.7);' +
      'font-size:1.2rem;cursor:pointer;padding:0;">✕</button></div>' +
      '<div style="line-height:1.5;">' + msg + '</div>';
    document.body.appendChild(b);
    setTimeout(() => b.remove(), 18000);
  }

  function installPWA() {
    if (!_installPrompt) return;
    _installPrompt.prompt();
    _installPrompt.userChoice.then(r => {
      if (r.outcome === 'accepted') localStorage.setItem('prodeni_pwa_done', '1');
      _installPrompt = null;
      document.getElementById('installBanner')?.remove();
    });
  }

  function closeBanner() {
    document.getElementById('installBanner')?.remove();
    sessionStorage.setItem('prodeni_banner_closed', '1');
  }
</script>
</body>
</html>
